<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito – BlueCode</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
</head>
<body>

<header>
    <nav class="navbar">
        <img src="Blue.png" alt="BlueCode" height="95">
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="catalogo.html">Catálogo</a></li>
            <li><a href="nosotros.html">Nosotros</a></li>
            <li><a href="producto.html">EcoFloat</a></li>
            <li><a href="contacto.html">Contacto</a></li>
            <li><a href="hermanas.html">Paginas hermanas</a></li>
            <li><a href="politicas.html">Politicas</a></li>
            <li><a href="comercial.html">Comercial</a></li>
            <li><a href="formulario.html">Formulario</a></li>
            <li><a href="carrito.html">🛒</a></li>
            <li id="nav-sesion"><a href="login.html">Cerrar</a></li>
        </ul>
    </nav>
</header>
<script>
    const usuario = localStorage.getItem('bluecode_usuario');
    const navSesion = document.getElementById('nav-sesion');

    if (usuario) {
        navSesion.innerHTML = `<a href="#" onclick="cerrarSesion()">Cerrar sesión (${usuario})</a>`;
    }

    function cerrarSesion() {
        localStorage.removeItem('bluecode_usuario');
        window.location.href = 'login.html';
    }
</script>

<section class="carrito">
    <h2>Carrito de Compras</h2>

    <div class="item">
        <span class="item-nombre">🌊 EcoFloat Básico</span>
        <span class="item-precio">$5,000</span>
    </div>

    <div class="total-row">
        <span class="label">Total</span>
        <span class="monto">$5,000</span>
    </div>

    <a href="checkout.html" class="btn">Proceder al pago</a>
</section>

<footer>
    © 2026 <span>BlueCode</span> — Innovación que protege el planeta.
</footer>

</body>
</html>
