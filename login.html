<script>
    const API_URL = 'https://web-eco-production.up.railway.app/api';

    document.getElementById('form-login').addEventListener('submit', function(e) {
        e.preventDefault();
        const datos = {
            email: document.getElementById('email-login').value,
            password: document.getElementById('pass-login').value
        };
        fetch(`${API_URL}/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(datos)
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'ok') {
                alert('Bienvenido, ' + data.usuario);
                window.location.href = 'index.html';
            } else {
                alert('Error: ' + data.mensaje);
            }
        })
        .catch(err => console.error('Error:', err));
    });

    document.getElementById('form-reg').addEventListener('submit', function(e) {
        e.preventDefault();
        const datos = {
            nombre: document.getElementById('nombre-reg').value,
            email: document.getElementById('email-reg').value,
            password: document.getElementById('pass-reg').value
        };
        fetch(`${API_URL}/registro`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(datos)
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'ok') {
                alert(data.mensaje);
                document.getElementById('form-reg').reset();
            } else {
                alert('Error: ' + data.mensaje);
            }
        })
        .catch(err => console.error('Error:', err));
    });
</script>
